{% extends "base.html" %}
{% block content %}
<section class="auth-card neon-card">
    <div class="auth-brand"><span class="brand-mark">D</span><b>Detector</b><small>PhishGuard</small></div>
    <h1>Welcome back</h1>
    <p>Sign in to continue monitoring suspicious URLs.</p>
    <form method="post">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    <button class="google-btn" type="button" data-google-auth>Sign in with Google</button>
    <div class="auth-links">
        <a href="{{ url_for('register') }}">Create account</a>
        <a href="{{ url_for('forgot') }}">Forgot password?</a>
    </div>
</section>
{% endblock %}
